spring:
  application:
    name: carbontrack
  main:
    lazy-initialization: false

  # ── PostgreSQL Datasource ─────────
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  # ── JPA / Hibernate ───────────────
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        transaction:
          jta:
            platform: org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatformImpl
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
    show-sql: false

  # ── Flyway Migrations ─────────────
  flyway:
    enabled: true
    baseline-on-migrate: true

  # ── Redis Cache ────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      repositories:
        enabled: false

  # ── Google OAuth2 ──────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

# ── Resend Email Configuration ──────
resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}

# ── JWT Configuration ────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 900000 # 15 minutes
    refresh-expiration-ms: 604800000 # 7 days
  oauth2:
    authorized-redirect-uris: ${FRONTEND_URL:http://localhost:5173}/oauth2/redirect

# ── Server ───────────────────────────
server:
  port: ${PORT:8080}
  forward-headers-strategy: native
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
    min-response-size: 1024
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: ".*"

# ── Springdoc / Swagger ──────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ── Cohere AI ────────────────────────
cohere:
  api-key: ${COHERE_API_KEY}

# ── Actuator Health & Metrics Endpoint ─────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ── Cloudinary Configuration ────────
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

# ── Logging ──────────────────────────
logging:
  level:
    root: INFO
    com.carbontrack: INFO
    org.springframework.security: WARN
